<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Watchtopia HLS Tester</title>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f13;
            color: #fff;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 1000px;
        }

        h1 {
            margin-bottom: 20px;
            color: #4facfe;
        }

        .controls {
            background: #1e1e24;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
        }

        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 10px;
        }

        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #2b2b36;
            color: #fff;
            font-size: 16px;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: #4facfe;
        }

        select {
            padding: 10px;
            border-radius: 6px;
            background: #2b2b36;
            color: #fff;
            border: 1px solid #333;
            flex: 1;
        }

        button {
            background: #4facfe;
            color: #fff;
            border: none;
            padding: 10px 25px;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }

        button:hover {
            background: #00f2fe;
        }

        .video-container {
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        video {
            width: 100%;
            height: 100%;
        }

        .status {
            margin-top: 10px;
            font-family: monospace;
            color: #888;
        }

        .error-log {
            color: #ff6b6b;
            margin-top: 5px;
        }

        .buffer-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.7);
            padding: 15px 25px;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            z-index: 10;
        }

        .stats-panel {
            margin-top: 10px;
            font-family: monospace;
            font-size: 12px;
            color: #aaa;
            background: #1e1e24;
            padding: 10px;
            border-radius: 6px;
            width: 100%;
        }
    </style>
</head>

<body>
    <div class="container">
        <h1>Watchtopia Stream Tester</h1>

        <div class="controls">
            <div class="input-group">
                <input type="text" id="streamUrl" placeholder="Paste .m3u8 or Proxy URL here..."
                    value="http://localhost:3000/v1/proxy?data=YOUR_DATA_HERE">
                <button onclick="loadStream()">Play Stream</button>
            </div>

            <div class="input-group" style="margin-top: 10px;">
                <select id="audioSelect" onchange="changeAudio()" disabled>
                    <option value="-1">Audio: Default</option>
                </select>
                <select id="subSelect" onchange="changeSubs()" disabled>
                    <option value="-1">Subtitles: Off</option>
                </select>
            </div>

            <div id="status" class="status">Ready</div>
        </div>

        <div class="video-container">
            <video id="video" controls playsinline></video>
            <div id="bufferIndicator" class="buffer-overlay">Buffering...</div>
        </div>

        <div id="stats" class="stats-panel"></div>
    </div>

    <script>
        var video = document.getElementById('video');
        var streamUrlInput = document.getElementById('streamUrl');
        var statusDiv = document.getElementById('status');
        var bufferIndicator = document.getElementById('bufferIndicator');
        var statsDiv = document.getElementById('stats');
        var audioSelect = document.getElementById('audioSelect');
        var subSelect = document.getElementById('subSelect');
        var hls = null;
        var statsInterval = null;

        // Auto-load if 'url' param exists
        window.onload = function () {
            const params = new URLSearchParams(window.location.search);
            const url = params.get('url');
            if (url) {
                streamUrlInput.value = url;
                loadStream();
            }
        }

        function updateStats() {
            if (!hls || !video) return;
            var debugInfo = "";

            // Buffer length
            var bufLen = 0;
            if (video.buffered.length > 0) {
                // Find buffer for current time
                for (var i = 0; i < video.buffered.length; i++) {
                    if (video.buffered.start(i) <= video.currentTime && video.buffered.end(i) >= video.currentTime) {
                        bufLen = video.buffered.end(i) - video.currentTime;
                        break;
                    }
                }
            }

            debugInfo += "Buffer: " + bufLen.toFixed(2) + "s | ";
            if (hls.bandwidthEstimate) {
                debugInfo += "Bandwidth: " + (hls.bandwidthEstimate / 1024 / 1024).toFixed(2) + " Mbps | ";
            }
            if (hls.levels && hls.currentLevel >= 0) {
                const level = hls.levels[hls.currentLevel];
                debugInfo += "Quality: " + level.height + "p";
            }

            statsDiv.innerText = debugInfo;
        }

        function changeAudio() {
            if (hls) {
                hls.audioTrack = parseInt(audioSelect.value);
                console.log("Audio track changed to " + hls.audioTrack);
            }
        }

        function changeSubs() {
            if (hls) {
                hls.subtitleTrack = parseInt(subSelect.value);
                console.log("Subtitle track changed to " + hls.subtitleTrack);
            }
        }

        function updateAudioTracks() {
            audioSelect.innerHTML = '<option value="-1">Audio: Default</option>';
            if (hls.audioTracks.length > 0) {
                hls.audioTracks.forEach((track, index) => {
                    var option = document.createElement("option");
                    option.value = index;
                    option.text = (track.name || track.lang || "Track " + (index + 1));
                    if (track.default) option.selected = true;
                    audioSelect.appendChild(option);
                });
                audioSelect.disabled = false;
            } else {
                audioSelect.disabled = true;
            }
        }

        function updateSubtitleTracks() {
            subSelect.innerHTML = '<option value="-1">Subtitles: Off</option>';
            if (hls.subtitleTracks.length > 0) {
                hls.subtitleTracks.forEach((track, index) => {
                    var option = document.createElement("option");
                    option.value = index;
                    option.text = (track.name || track.lang || "Sub " + (index + 1));
                    subSelect.appendChild(option);
                });
                subSelect.disabled = false;
            } else {
                subSelect.disabled = true;
            }
        }

        function loadStream() {
            const url = streamUrlInput.value.trim();
            if (!url) return;

            if (Hls.isSupported()) {
                if (hls) {
                    hls.destroy();
                    clearInterval(statsInterval);
                }

                statusDiv.innerHTML = 'Loading... ' + url;

                hls = new Hls({
                    debug: false,
                    enableWorker: true,
                    lowLatencyMode: true,
                    maxBufferLength: 30, // 30 seconds buffer
                    maxMaxBufferLength: 60,
                });

                hls.loadSource(url);
                hls.attachMedia(video);

                hls.on(Hls.Events.MANIFEST_PARSED, function () {
                    statusDiv.innerHTML = '<span style="color:#4facfe">Manifest Loaded. Starting playback...</span>';
                    video.play().catch(e => {
                        statusDiv.innerHTML += '<br><span class="error-log">Autoplay failed: ' + e.message + '</span>';
                    });
                    statsInterval = setInterval(updateStats, 500);
                });

                hls.on(Hls.Events.AUDIO_TRACKS_UPDATED, updateAudioTracks);
                hls.on(Hls.Events.SUBTITLE_TRACKS_UPDATED, updateSubtitleTracks);

                // Buffering handling

                // Buffering handling
                video.addEventListener('waiting', () => {
                    bufferIndicator.style.display = 'block';
                });
                video.addEventListener('playing', () => {
                    bufferIndicator.style.display = 'none';
                });

                hls.on(Hls.Events.ERROR, function (event, data) {
                    if (data.fatal) {
                        switch (data.type) {
                            case Hls.ErrorTypes.NETWORK_ERROR:
                                statusDiv.innerHTML += '<br><span class="error-log">Fatal Network Error</span>';
                                console.error("fatal network error", data);
                                hls.startLoad();
                                break;
                            case Hls.ErrorTypes.MEDIA_ERROR:
                                statusDiv.innerHTML += '<br><span class="error-log">Fatal Media Error - Trying to recover...</span>';
                                console.error("fatal media error", data);
                                hls.recoverMediaError();
                                break;
                            default:
                                statusDiv.innerHTML += '<br><span class="error-log">Fatal Error: ' + data.details + '</span>';
                                console.error("fatal error", data);
                                hls.destroy();
                                break;
                        }
                    } else {
                        console.warn("Non-fatal error:", data);
                    }
                });
            }
            else if (video.canPlayType('application/vnd.apple.mpegurl')) {
                // Native support (Safari)
                video.src = url;
                video.addEventListener('loadedmetadata', function () {
                    video.play();
                });
            }
        }
    </script>
</body>

</html>
